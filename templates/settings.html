{% extends "base.html" %}
{% block content %}
  <section class="card">
    <h2>Settings</h2>
    {% if not plants %}
      <p>No plants available yet. Send telemetry from the ESP32 first.</p>
    {% else %}
      <form class="inline-form" method="get" action="{{ url_for('settings_page') }}">
        <label for="plant_id">Plant</label>
        <select id="plant_id" name="plant_id">
          {% for plant in plants %}
            <option value="{{ plant.plant_id }}" {% if selected_plant and selected_plant.plant_id == plant.plant_id %}selected{% endif %}>
              {{ plant.plant_name }} ({{ plant.plant_id }})
            </option>
          {% endfor %}
        </select>
        <button type="submit">Load</button>
      </form>
    {% endif %}
  </section>

  {% if selected_plant %}
    <section class="card">
      {% if message %}
        <p class="flash {{ message_type }}">{{ message }}</p>
      {% endif %}

      <form method="post" action="{{ url_for('settings_page') }}" class="settings-form">
        <input type="hidden" name="plant_id" value="{{ selected_plant.plant_id }}" />

        <label for="start_threshold">Start watering below (%)</label>
        <input
          id="start_threshold"
          name="start_threshold"
          type="number"
          step="0.1"
          min="0"
          max="100"
          value="{{ '%.1f'|format(selected_settings.start_threshold) }}"
          required
        />

        <label for="stop_threshold">Stop watering above (%)</label>
        <input
          id="stop_threshold"
          name="stop_threshold"
          type="number"
          step="0.1"
          min="0"
          max="100"
          value="{{ '%.1f'|format(selected_settings.stop_threshold) }}"
          required
        />

        <button type="submit">Save thresholds</button>
      </form>
    </section>
  {% endif %}
{% endblock %}
